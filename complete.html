<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complete</title>

<style>

body{
margin:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;



}

#final-screen{
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

#final-image{
max-width:100vw;
max-height:60vh;
display:block;
}

#final-message{

position:absolute;

top:10%;
left:50%;

transform:translate(-50%,-50%);

font-size:clamp(20px,4vw,20px);

color:white;

letter-spacing:0.06em;

text-align:center;

text-shadow:0 0 20px rgba(0,0,0,0.8);

opacity:0;

animation:fadeIn 0s ease forwards;

}

@keyframes fadeIn{

from{
opacity:0;
}

to{
opacity:1;
}

}

</style>

</head>

<body>

<div id="final-screen">

<img src="final-image.png" id="final-image">

<div id="final-message">
声原生成中
</div>

</div>

</body>

</html>
